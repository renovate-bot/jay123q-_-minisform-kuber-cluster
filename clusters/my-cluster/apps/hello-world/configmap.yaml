apiVersion: v1
kind: ConfigMap
metadata:
  name: hello-world-html
  namespace: default
data:
  index.html: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Kubernetes Homelab - Self-Hosting Guide</title>
        <style>
            * { margin: 0; padding: 0; box-sizing: border-box; }
            body {
                font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
                line-height: 1.6;
                color: #333;
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                padding: 20px;
            }
            .container {
                max-width: 1200px;
                margin: 0 auto;
                background: white;
                border-radius: 10px;
                box-shadow: 0 10px 40px rgba(0,0,0,0.2);
                overflow: hidden;
            }
            header {
                background: linear-gradient(135deg, #2d3748 0%, #1a202c 100%);
                color: white;
                padding: 40px;
                text-align: center;
            }
            h1 { font-size: 2.5em; margin-bottom: 10px; }
            .subtitle { font-size: 1.2em; opacity: 0.9; }
            .content { padding: 40px; }
            h2 {
                color: #2d3748;
                margin: 30px 0 15px 0;
                padding-bottom: 10px;
                border-bottom: 3px solid #667eea;
            }
            h3 {
                color: #4a5568;
                margin: 20px 0 10px 0;
            }
            pre {
                background: #1a202c;
                color: #68d391;
                padding: 20px;
                border-radius: 8px;
                overflow-x: auto;
                margin: 15px 0;
                font-size: 0.9em;
            }
            .command { color: #63b3ed; }
            .comment { color: #a0aec0; }
            .example-box {
                background: #f7fafc;
                border-left: 4px solid #667eea;
                padding: 20px;
                margin: 20px 0;
                border-radius: 5px;
            }
            .warning {
                background: #fff5f5;
                border-left: 4px solid #fc8181;
                padding: 15px;
                margin: 15px 0;
                border-radius: 5px;
            }
            .success {
                background: #f0fff4;
                border-left: 4px solid #68d391;
                padding: 15px;
                margin: 15px 0;
                border-radius: 5px;
            }
            ul, ol { margin: 15px 0 15px 30px; }
            li { margin: 8px 0; }
            code {
                background: #edf2f7;
                padding: 2px 6px;
                border-radius: 3px;
                font-family: 'Courier New', monospace;
                font-size: 0.9em;
            }
            .footer {
                background: #f7fafc;
                padding: 20px;
                text-align: center;
                color: #718096;
                border-top: 1px solid #e2e8f0;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <header>
                <h1>🎮 Kubernetes Homelab</h1>
                <p class="subtitle">Self-Hosting Guide: Minecraft Servers & More</p>
            </header>
    
            <div class="content">
                <div class="success">
                    <strong>✅ Status:</strong> Your Kubernetes cluster is running!<br>
                    <strong>🌐 Node IP:</strong> 192.168.1.112<br>
                    <strong>📦 MetalLB Pool:</strong> 192.168.1.200 - 192.168.1.250<br>
                    <strong>🔧 Access Method:</strong> NodePort (Wireless) / LoadBalancer (Wired)
                </div>
    
                <h2>🎯 Hosting a Minecraft Server on Kubernetes</h2>
                
                <h3>Option 1: Basic Minecraft Server with LoadBalancer</h3>
                <div class="example-box">
                    <p>This configuration will give your Minecraft server its own IP address from the MetalLB pool:</p>
                </div>
    
    <pre><span class="comment"># minecraft-server.yaml</span>
    apiVersion: v1
    kind: PersistentVolumeClaim
    metadata:
      name: minecraft-data
      namespace: default
    spec:
      accessModes:
        - ReadWriteOnce
      resources:
        requests:
          storage: 10Gi
    ---
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: minecraft-server
      namespace: default
    spec:
      replicas: 1
      selector:
        matchLabels:
          app: minecraft
      template:
        metadata:
          labels:
            app: minecraft
        spec:
          containers:
          - name: minecraft
            image: itzg/minecraft-server:latest
            env:
            - name: EULA
              value: "TRUE"
            - name: TYPE
              value: "VANILLA"
            - name: VERSION
              value: "LATEST"
            - name: MEMORY
              value: "2G"
            - name: DIFFICULTY
              value: "normal"
            - name: MAX_PLAYERS
              value: "20"
            - name: MOTD
              value: "Welcome to my Kubernetes Minecraft Server!"
            ports:
            - containerPort: 25565
              name: minecraft
            volumeMounts:
            - name: data
              mountPath: /data
            resources:
              requests:
                memory: "2Gi"
                cpu: "1000m"
              limits:
                memory: "4Gi"
                cpu: "2000m"
          volumes:
          - name: data
            persistentVolumeClaim:
              claimName: minecraft-data
    ---
    apiVersion: v1
    kind: Service
    metadata:
      name: minecraft-server
      namespace: default
    spec:
      type: LoadBalancer
      ports:
      - port: 25565
        targetPort: 25565
        protocol: TCP
        name: minecraft
      selector:
        app: minecraft
    </pre>
    
                <h3>Deploy the Minecraft Server:</h3>
    <pre><span class="command">kubectl apply -f minecraft-server.yaml</span>
    
    <span class="comment"># Check the assigned IP:</span>
    <span class="command">kubectl get svc minecraft-server</span>
    
    <span class="comment"># Output shows EXTERNAL-IP (e.g., 192.168.1.200)</span>
    <span class="comment"># Connect in Minecraft: 192.168.1.200:25565</span>
    </pre>
    
                <h3>Option 2: Modded Minecraft Server (Forge/Fabric)</h3>
                <div class="example-box">
                    <p>Run modded Minecraft servers by changing the TYPE environment variable:</p>
                </div>
    
    <pre><span class="comment"># For Forge:</span>
            - name: TYPE
              value: "FORGE"
            - name: FORGEVERSION
              value: "RECOMMENDED"
    
    <span class="comment"># For Fabric:</span>
            - name: TYPE
              value: "FABRIC"
    
    <span class="comment"># For PaperMC (optimized):</span>
            - name: TYPE
              value: "PAPER"
    </pre>
    
                <h3>Option 3: Multiple Minecraft Servers</h3>
                <div class="example-box">
                    <p>Host multiple servers (Survival, Creative, Modded) each with their own IP:</p>
                </div>
    
    <pre><span class="comment"># survival-server.yaml</span>
    apiVersion: v1
    kind: Service
    metadata:
      name: minecraft-survival
    spec:
      type: LoadBalancer
      ports:
      - port: 25565
        targetPort: 25565
      selector:
        app: minecraft-survival
    <span class="comment"># Will get 192.168.1.200</span>
    
    ---
    <span class="comment"># creative-server.yaml</span>
    apiVersion: v1
    kind: Service
    metadata:
      name: minecraft-creative
    spec:
      type: LoadBalancer
      ports:
      - port: 25565
        targetPort: 25565
      selector:
        app: minecraft-creative
    <span class="comment"># Will get 192.168.1.201</span>
    
    ---
    <span class="comment"># modded-server.yaml</span>
    apiVersion: v1
    kind: Service
    metadata:
      name: minecraft-modded
    spec:
      type: LoadBalancer
      ports:
      - port: 25565
        targetPort: 25565
      selector:
        app: minecraft-modded
    <span class="comment"># Will get 192.168.1.202</span>
    </pre>
    
                <h2>🔧 Managing Your Minecraft Server</h2>
    
                <h3>View Server Logs:</h3>
    <pre><span class="command">kubectl logs -f deployment/minecraft-server</span></pre>
    
                <h3>Execute Commands in Server:</h3>
    <pre><span class="command">kubectl exec -it deployment/minecraft-server -- rcon-cli</span>
    <span class="comment"># Then run commands like: op PlayerName, whitelist add PlayerName</span></pre>
    
                <h3>Backup Your World:</h3>
    <pre><span class="command">kubectl cp default/minecraft-server-&lt;pod-name&gt;:/data ./minecraft-backup</span></pre>
    
                <h3>Update Server Version:</h3>
    <pre><span class="command">kubectl set env deployment/minecraft-server VERSION=1.20.4</span>
    <span class="command">kubectl rollout restart deployment/minecraft-server</span></pre>
    
                <h2>🌐 Accessing via NodePort (Current Wireless Setup)</h2>
                <div class="warning">
                    <strong>⚠️ Note:</strong> Since you're on wireless, MetalLB LoadBalancer IPs won't be accessible from your PC. Use NodePort instead:
                </div>
    
    <pre><span class="comment"># Instead of LoadBalancer, use NodePort:</span>
    apiVersion: v1
    kind: Service
    metadata:
      name: minecraft-server
    spec:
      type: NodePort
      ports:
      - port: 25565
        targetPort: 25565
        nodePort: 30565  <span class="comment"># Pick 30000-32767</span>
      selector:
        app: minecraft
    
    <span class="comment"># Connect to: 192.168.1.112:30565</span>
    </pre>
    
                <h2>🎮 Other Self-Hosting Ideas</h2>
    
                <h3>Terraria Server:</h3>
    <pre>image: ryshe/terraria:latest
    ports: 7777</pre>
    
                <h3>Valheim Server:</h3>
    <pre>image: lloesche/valheim-server:latest
    ports: 2456-2458</pre>
    
                <h3>ARK: Survival Evolved:</h3>
    <pre>image: ich777/arkserver:latest
    ports: 7777, 7778, 27015</pre>
    
                <h3>TeamSpeak/Discord Bot:</h3>
    <pre>image: teamspeak:latest
    ports: 9987, 10011, 30033</pre>
    
                <h2>📚 Useful Commands</h2>
    
    <pre><span class="comment"># List all services and their IPs/Ports:</span>
    <span class="command">kubectl get svc -A</span>
    
    <span class="comment"># Check MetalLB IP pool usage:</span>
    <span class="command">kubectl get ipaddresspools -n metallb-system</span>
    
    <span class="comment"># View pod status:</span>
    <span class="command">kubectl get pods -A</span>
    
    <span class="comment"># Delete a service:</span>
    <span class="command">kubectl delete svc minecraft-server</span>
    
    <span class="comment"># Scale server replicas (not recommended for Minecraft):</span>
    <span class="command">kubectl scale deployment minecraft-server --replicas=1</span>
    </pre>
    
                <h2>🚀 Next Steps</h2>
                <ul>
                    <li><strong>Port Forward on Router:</strong> Forward port 25565 to 192.168.1.112:30565 for external access</li>
                    <li><strong>Setup Dynamic DNS:</strong> Use services like DuckDNS or No-IP for a persistent domain</li>
                    <li><strong>Add Backup Cronjobs:</strong> Automatically backup your worlds daily</li>
                    <li><strong>Install Ingress:</strong> Use hostname-based routing for web services</li>
                    <li><strong>Add Monitoring:</strong> Deploy Grafana/Prometheus to monitor resources</li>
                    <li><strong>Use Wired Connection:</strong> Switch to Ethernet for MetalLB LoadBalancer to work</li>
                </ul>
    
                <h2>📖 Resources</h2>
                <ul>
                    <li><a href="https://github.com/itzg/docker-minecraft-server">itzg/minecraft-server Docker Docs</a></li>
                    <li><a href="https://kubernetes.io/docs/">Kubernetes Documentation</a></li>
                    <li><a href="https://metallb.universe.tf/">MetalLB Documentation</a></li>
                    <li><a href="https://fluxcd.io/docs/">Flux GitOps Documentation</a></li>
                </ul>
            </div>
    
            <div class="footer">
                <p>🎯 Powered by Kubernetes + Flux + MetalLB + Cilium</p>
                <p>Your IP: <span id="client-ip">Loading...</span></p>
            </div>
        </div>
    
        <script>
            fetch('https://api.ipify.org?format=json')
                .then(response => response.json())
                .then(data => {
                    document.getElementById('client-ip').textContent = data.ip;
                })
                .catch(() => {
                    document.getElementById('client-ip').textContent = 'Unable to detect';
                });
        </script>
    </body>
    </html>
