apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cilium
  namespace: flux-system
spec:
  interval: 30m
  timeout: 10m
  targetNamespace: kube-system
  install:
    remediation:
      retries: 3
  chart:
    spec:
      chart: cilium
      version: "1.15.x"
      sourceRef:
        kind: HelmRepository
        name: cilium
        namespace: flux-system
      interval: 12h
  values:
    ipam:
      mode: kubernetes
    kubeProxyReplacement: false  # Set to true if you want Cilium to replace kube-proxy
    k8sServiceHost: linux.attlocal.net  # Your control plane node
    k8sServicePort: 6443
    hubble:
      enabled: true
      relay:
        enabled: true
      ui:
        enabled: true
