---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cilium
  namespace: kube-system
spec:
  interval: 15m
  chart:
    spec:
      chart: cilium
      version: '1.18.6'
      sourceRef:
        kind: HelmRepository
        name: cilium
        namespace: kube-system
      interval: 1h
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
    # Use only if you encounter immutable field errors during 2026 updates
    # force: true 
  values:
    # --- 2026 Connectivity & Security Fixes ---
    
    # Required for connectivity tests in hardened clusters (e.g., Talos)
    # This allows test pods to run with necessary privileges
    agent:
      podSecurityContext:
        enabled: true


  # --- Core Configuration ---
  # Essential for 2026 connectivity testing
    hubble:
      enabled: true
      relay:
        enabled: true
      ui:
        enabled: true
    
    # Ensure DNS proxy is active for connectivity checks
    dnsproxy:
      enable: true
      
    operator:
      replicas: 1
    envoy:
      enabled: true
    ipam:
      mode: kubernetes
    
    # Correctly nested TLS/Secrets configuration
    tls:
      readSecretsOnlyFromSecretsNamespace: true
      secretsNamespace:
        name: cilium-secrets
      secretSync:
        enabled: true
    # ... your existing values ...
    k8sServiceHost: 192.168.1.112 # Explicitly set your node IP
    k8sServicePort: 6443
    
    # Critical for MetalLB L2 compatibility
    bpf:
      lbExternalClusterIP: true
    
    # Since you had redirection issues (exit code 28), 
    # ensure host-reachability is enabled for the proxy
    hostServices:
      enabled: true
    externalIPs:
      enabled: true
    nodePort:
      enabled: true