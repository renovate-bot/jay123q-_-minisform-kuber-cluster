---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cilium
  namespace: kube-system
spec:
  interval: 15m
  chart:
    spec:
      chart: cilium
      version: '1.18.6'
      sourceRef:
        kind: HelmRepository
        name: cilium
        namespace: kube-system
      interval: 1h
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
    # Use only if you encounter immutable field errors during 2026 updates
    # force: true 
  values:
    # --- 2026 Connectivity & Security Fixes ---
    
    # Required for connectivity tests in hardened clusters (e.g., Talos)
    # This allows test pods to run with necessary privileges
    agent:
      podSecurityContext:
        enabled: true


  # --- Core Configuration ---
  values:
    operator:
      replicas: 1
    envoy:
      enabled: true
    ipam:
      mode: kubernetes
    
    # Correctly nested TLS/Secrets configuration
    tls:
      readSecretsOnlyFromSecretsNamespace: true
      secretsNamespace:
        name: cilium-secrets
      secretSync:
        enabled: true
