---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cilium
  namespace: kube-system # The object location
spec:
  interval: 10m
  timeout: 10m
  # targetNamespace: kube-system # (Optional) explicit target
  chart:
    spec:
      chart: cilium
      version: '1.18.6'
      sourceRef:
        kind: HelmRepository
        name: cilium
        namespace: kube-system
      interval: 1h
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
    # Only use 'force' if you have persistent CRD/Immutable field issues
    # force: true 
  values:
    operator:
      replicas: 1
    envoy:
      enabled: true
    ipam:
      mode: kubernetes
    
    # Correctly nested TLS/Secrets configuration
    tls:
      readSecretsOnlyFromSecretsNamespace: true
      secretsNamespace:
        name: cilium-secrets
      secretSync:
        enabled: true
